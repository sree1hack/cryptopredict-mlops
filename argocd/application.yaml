apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cryptopredict-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/sree1hack/cryptopredict-mlops.git'
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: crypto-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
